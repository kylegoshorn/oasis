<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE OASIS — Class Display</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0A0A0F;
    --navy: #0D0D1A;
    --card: #12121F;
    --card2: #1A1A2E;
    --gold: #FFD700;
    --gold-dim: #B8960C;
    --cyan: #00F5FF;
    --purple: #7B2FFF;
    --green: #00FF88;
    --red: #FF4757;
    --white: #F0F0F0;
    --muted: #6B7280;
    --border: rgba(255,215,0,0.18);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: var(--black);
    color: var(--white);
    font-family: 'Inter', sans-serif;
    height: 100vh;
    overflow: hidden;
  }

  body {
    background:
      radial-gradient(ellipse 50% 50% at 15% 10%, rgba(123,47,255,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 40% 40% at 90% 90%, rgba(0,245,255,0.08) 0%, transparent 60%),
      var(--black);
  }

  /* ── TOP BAR ── */
  .topbar {
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 2rem;
    border-bottom: 1px solid var(--border);
    background: rgba(10,10,15,0.6);
  }

  .topbar-logo {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: 1.3rem;
    letter-spacing: 0.1em;
    color: var(--gold);
  }
  .topbar-logo span { color: var(--cyan); }

  .grade-toggle {
    display: flex;
    gap: 0.5rem;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.3rem;
  }

  .grade-btn {
    background: transparent;
    border: none;
    color: var(--muted);
    padding: 0.5rem 1.5rem;
    border-radius: 7px;
    font-family: 'Orbitron', sans-serif;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: all 0.2s;
  }

  .grade-btn.active {
    background: var(--gold);
    color: var(--black);
  }

  .topbar-clock {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.9rem;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  /* ── MAIN GRID ── */
  .display-grid {
    height: calc(100vh - 64px - 90px);
    display: grid;
    grid-template-columns: 380px 1fr;
    gap: 1px;
    background: var(--border);
  }

  .panel {
    background: var(--black);
    padding: 1.5rem 1.75rem;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .panel-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: var(--gold);
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    flex-shrink: 0;
  }

  /* ── LEADERBOARD PANEL ── */
  .lb-list {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .lb-row {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    background: var(--card);
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 8px;
    padding: 0.6rem 0.85rem;
  }

  .lb-row.top1 { border-color: var(--gold); background: rgba(255,215,0,0.06); }
  .lb-row.top2 { border-color: rgba(0,245,255,0.4); }
  .lb-row.top3 { border-color: rgba(123,47,255,0.4); }

  .lb-rank {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: 1rem;
    color: var(--muted);
    width: 24px;
    text-align: center;
    flex-shrink: 0;
  }
  .lb-row.top1 .lb-rank { color: var(--gold); }
  .lb-row.top2 .lb-rank { color: var(--cyan); }
  .lb-row.top3 .lb-rank { color: var(--purple); }

  .lb-tag {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--white);
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .lb-xp {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    color: var(--gold);
    flex-shrink: 0;
  }

  /* ── RIGHT SIDE: STACKED PANELS ── */
  .right-stack {
    display: grid;
    grid-template-rows: auto 1fr auto;
    gap: 1px;
    background: var(--border);
    overflow: hidden;
  }

  .right-stack .panel { background: var(--black); }

  /* PLAN LIST */
  .plan-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
    overflow-y: auto;
  }

  .plan-item {
    display: flex;
    align-items: flex-start;
    gap: 0.75rem;
    font-size: 1rem;
    color: var(--white);
    line-height: 1.4;
  }

  .plan-num {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    color: var(--cyan);
    flex-shrink: 0;
    min-width: 1.5rem;
  }

  /* SUCCESS CRITERIA */
  .success-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    overflow-y: auto;
  }

  .success-item {
    display: flex;
    align-items: flex-start;
    gap: 0.6rem;
    font-size: 0.95rem;
    color: var(--white);
    line-height: 1.4;
  }

  .success-item::before {
    content: '✓';
    color: var(--green);
    font-weight: 700;
    flex-shrink: 0;
  }

  /* CHECKLIST BAR (bottom) */
  .checklist-bar {
    display: flex;
    align-items: center;
    gap: 2rem;
    padding: 0 1.75rem;
    flex-wrap: wrap;
  }

  .checklist-item {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
    color: var(--white);
  }

  .check-box {
    width: 20px;
    height: 20px;
    border: 2px solid var(--gold);
    border-radius: 4px;
    flex-shrink: 0;
  }

  /* ── BOTTOM BAR: WEEKLY GOAL ── */
  .goalbar {
    height: 90px;
    display: flex;
    align-items: center;
    gap: 1.5rem;
    padding: 0 2rem;
    background: linear-gradient(135deg, rgba(255,215,0,0.08), rgba(123,47,255,0.08));
    border-top: 1px solid var(--border);
  }

  .goalbar-icon { font-size: 2rem; flex-shrink: 0; }

  .goalbar-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    color: var(--gold);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .goalbar-text {
    font-size: 1.1rem;
    color: var(--white);
    font-weight: 500;
    margin-top: 0.2rem;
  }

  .empty-note {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
    color: var(--muted);
  }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--black); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  @media (max-width: 1000px) {
    .display-grid { grid-template-columns: 1fr; grid-template-rows: 300px 1fr; }
  }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-logo">THE <span>OASIS</span></div>
  <div class="grade-toggle" id="gradeToggle">
    <button class="grade-btn active" data-grade="6th" onclick="setGrade('6th', this)">6th Grade</button>
    <button class="grade-btn" data-grade="7th" onclick="setGrade('7th', this)">7th Grade</button>
    <button class="grade-btn" data-grade="8th" onclick="setGrade('8th', this)">8th Grade</button>
  </div>
  <div class="topbar-clock" id="clock">--:--</div>
</div>

<!-- MAIN GRID -->
<div class="display-grid">

  <!-- LEFT: LEADERBOARD -->
  <div class="panel">
    <div class="panel-title">🏆 Live Leaderboard</div>
    <div class="lb-list" id="lbList">
      <p class="empty-note">// Loading...</p>
    </div>
  </div>

  <!-- RIGHT: PLAN + SUCCESS + CHECKLIST -->
  <div class="right-stack">

    <div class="panel">
      <div class="panel-title">📋 Today's Plan</div>
      <ol class="plan-list" id="planList" style="padding:0;">
        <li class="empty-note">// No plan posted yet</li>
      </ol>
    </div>

    <div class="panel">
      <div class="panel-title">🎯 Success Looks Like</div>
      <ul class="success-list" id="successList" style="padding:0;">
        <li class="empty-note">// No success criteria posted yet</li>
      </ul>
    </div>

    <div class="panel" style="padding-top:1rem;padding-bottom:1rem;">
      <div class="panel-title" style="margin-bottom:0.75rem;">✅ Checklist</div>
      <div class="checklist-bar" id="checklistBar">
        <span class="empty-note">// No checklist posted yet</span>
      </div>
    </div>

  </div>

</div>

<!-- BOTTOM: WEEKLY GOAL -->
<div class="goalbar">
  <div class="goalbar-icon">🎯</div>
  <div>
    <div class="goalbar-label">// This Week's Goal</div>
    <div class="goalbar-text" id="weeklyGoalText">Loading...</div>
  </div>
</div>

<script>
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxcz_geFVeMpJHSIBR9R50mnz7oaxeWb3xuOJkk2iCry2FS1GV1_Wpfl3JZ3v7XiwTBdw/exec';

  let currentGrade = '6th';

  function setGrade(grade, btn) {
    currentGrade = grade;
    document.querySelectorAll('.grade-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    loadClassContent();
  }

  // ── CLOCK ──
  function updateClock() {
    const now = new Date();
    document.getElementById('clock').textContent = now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
  }
  updateClock();
  setInterval(updateClock, 10000);

  // ── LEADERBOARD ──
  async function loadLeaderboard() {
    const list = document.getElementById('lbList');
    try {
      const res = await fetch(APPS_SCRIPT_URL);
      const data = await res.json();
      const valid = (data.students || [])
        .filter(s => s.GamerTag && s.GamerTag.trim() !== '')
        .sort((a,b) => (Number(b.Current_XP)||0) - (Number(a.Current_XP)||0))
        .slice(0, 12);

      if (valid.length === 0) {
        list.innerHTML = '<p class="empty-note">// No questers yet</p>';
        return;
      }

      list.innerHTML = valid.map((s, i) => {
        const rank = i + 1;
        const cls = rank === 1 ? 'top1' : rank === 2 ? 'top2' : rank === 3 ? 'top3' : '';
        const medal = rank === 1 ? '👑' : rank;
        return `
          <div class="lb-row ${cls}">
            <span class="lb-rank">${medal}</span>
            <span class="lb-tag">${escapeHtml(s.GamerTag)}</span>
            <span class="lb-xp">${(Number(s.Current_XP)||0).toLocaleString()} XP</span>
          </div>`;
      }).join('');
    } catch(e) {
      list.innerHTML = '<p class="empty-note">// Could not load leaderboard</p>';
    }
  }

  function escapeHtml(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  // ── CLASS CONTENT (Plan, Success, Checklist, Weekly Goal) ──
  async function loadClassContent() {
    const planList = document.getElementById('planList');
    const successList = document.getElementById('successList');
    const checklistBar = document.getElementById('checklistBar');
    const goalText = document.getElementById('weeklyGoalText');

    planList.innerHTML = '<li class="empty-note">// Loading...</li>';
    successList.innerHTML = '<li class="empty-note">// Loading...</li>';
    checklistBar.innerHTML = '<span class="empty-note">// Loading...</span>';
    goalText.textContent = 'Loading...';

    try {
      const res = await fetch(`${APPS_SCRIPT_URL}?action=getClassContent&Grade=${currentGrade}`);
      const data = await res.json();
      const c = data.content || {};

      // Plan (pipe-separated list)
      const planItems = (c.Plan || '').split('|').map(s => s.trim()).filter(Boolean);
      planList.innerHTML = planItems.length
        ? planItems.map((item, i) => `<li class="plan-item"><span class="plan-num">${i+1}.</span><span>${escapeHtml(item)}</span></li>`).join('')
        : '<li class="empty-note">// No plan posted yet</li>';

      // Success criteria (pipe-separated list)
      const successItems = (c.Success_Criteria || '').split('|').map(s => s.trim()).filter(Boolean);
      successList.innerHTML = successItems.length
        ? successItems.map(item => `<li class="success-item">${escapeHtml(item)}</li>`).join('')
        : '<li class="empty-note">// No success criteria posted yet</li>';

      // Checklist (pipe-separated list)
      const checklistItems = (c.Checklist || '').split('|').map(s => s.trim()).filter(Boolean);
      checklistBar.innerHTML = checklistItems.length
        ? checklistItems.map(item => `<div class="checklist-item"><div class="check-box"></div>${escapeHtml(item)}</div>`).join('')
        : '<span class="empty-note">// No checklist posted yet</span>';

      // Weekly goal
      goalText.textContent = c.Weekly_Goal && c.Weekly_Goal.trim() ? c.Weekly_Goal : 'No goal posted yet for this grade';

    } catch(e) {
      planList.innerHTML = '<li class="empty-note">// Could not load — check connection</li>';
      successList.innerHTML = '<li class="empty-note">// Could not load</li>';
      checklistBar.innerHTML = '<span class="empty-note">// Could not load</span>';
      goalText.textContent = 'Could not load';
    }
  }

  // ── INIT ──
  loadLeaderboard();
  loadClassContent();
  setInterval(loadLeaderboard, 60000);   // refresh leaderboard every 60s
  setInterval(loadClassContent, 120000); // refresh class content every 2 min
</script>
</body>
</html>
